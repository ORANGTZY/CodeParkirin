<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F5F5F5">
    <title>Parkirin - Kendaraan Anda</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F1F1F1; margin: 0; overscroll-behavior-y: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .slide-in { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .vehicle-card { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="flex justify-center h-screen text-gray-800 antialiased bg-gray-200">

    <div class="w-full max-w-[402px] bg-[#F1F1F1] h-full relative flex flex-col shadow-2xl overflow-hidden slide-in">
        <div class="w-full h-[120px] bg-[#F5F5F5] pt-12 px-4 flex items-center shadow-sm z-20 shrink-0">
            <a href="profil.html" class="text-[#0064F0] hover:opacity-80 active:scale-95 transition-all cursor-pointer mr-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
            </a>
            <h1 class="text-[20px] font-bold text-[#0064F0]">Kendaraan Anda</h1>
        </div>

        <div id="kendaraan-list" class="flex-grow overflow-y-auto hide-scrollbar z-10 flex flex-col mt-[11px] gap-[11px] pb-24 relative px-2">
            </div>

        <div class="absolute bottom-0 w-full h-[81px] bg-[#F5F5F5] border-t border-[#D9D9D9] flex items-center px-4 z-20 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
            <button onclick="jadikanUtama()" class="w-[177px] h-[28px] border border-[#0141A3] bg-white rounded-[8px] flex items-center justify-center hover:bg-blue-50 active:scale-95 transition-all">
                <span class="text-[14px] text-[#0141A3] font-medium">Pilih Sebagai Utama</span>
            </button>
            <a href="tambah-kendaraan.html" class="absolute -top-[24px] right-6 w-[65px] h-[65px] bg-[#0141A3] rounded-full shadow-lg hover:bg-blue-800 active:scale-90 transition-all z-30 flex items-center justify-center">
                <div class="relative flex items-center justify-center">
                     <div class="w-[30px] h-[5px] bg-white rounded-[2px] absolute"></div>
                     <div class="w-[5px] h-[30px] bg-white rounded-[2px] absolute"></div>
                </div>
            </a>
        </div>

        <div id="alertSuccess" class="absolute top-[130px] left-1/2 transform -translate-x-1/2 bg-[#0141A3] text-white px-4 py-2 rounded-full text-[12px] font-semibold shadow-md transition-all duration-300 opacity-0 pointer-events-none z-50">
            Berhasil diubah!
        </div>
    </div>

    <script>
        let kendaraanTerpilihId = null;
        let userData = JSON.parse(localStorage.getItem('user'));

        document.addEventListener("DOMContentLoaded", () => {
            if(!userData) window.location.href = 'login.html';
            fetchKendaraan();
        });

        async function fetchKendaraan() {
            try {
                const res = await fetch(`http://localhost:3000/api/kendaraan/${userData.id}`);
                const result = await res.json();
                renderKendaraan(result.data || []);
            } catch (err) {
                console.error("Gagal load kendaraan");
            }
        }

        function renderKendaraan(daftarKendaraan) {
            const container = document.getElementById('kendaraan-list');
            container.innerHTML = ''; 

            daftarKendaraan.forEach((kendaraan) => {
                const isUtamaHidden = kendaraan.is_utama ? '' : 'hidden';
                const cardHTML = `
                <div onclick="pilihKendaraan(this, ${kendaraan.id})" class="vehicle-card w-full min-h-[82px] bg-[#F5F5F5] border-2 border-transparent rounded-lg flex items-center justify-between px-4 py-3 shadow-sm select-none cursor-pointer">
                    <div class="flex items-center gap-4 pointer-events-none">
                        <div class="w-[91px] h-[53px] bg-[#D9D9D9] border-2 border-[#0F172A] rounded-[5px] flex items-center justify-center p-[2px] shrink-0">
                            <div class="w-full h-full bg-[#0F172A] rounded-[3px] flex items-center justify-center">
                                <span class="text-white text-[12px] font-semibold tracking-wide">${kendaraan.plat}</span>
                            </div>
                        </div>
                        <div class="flex flex-col justify-center">
                            <span class="text-[12px] font-semibold text-black leading-tight">${kendaraan.merek} ${kendaraan.model}</span>
                            <span class="text-[10px] text-black mt-1">${kendaraan.warna}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-[18px]">
                        <div class="status-utama flex items-center gap-1 ${isUtamaHidden}">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#0062E6]" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                            <span class="text-[10px] text-black opacity-60">Utama</span>
                        </div>
                        <a href="edit-kendaraan.html?id=${kendaraan.id}" onclick="event.stopPropagation()" class="text-[10px] font-semibold text-[#0062E6] hover:opacity-70 active:scale-95 transition-all z-10 relative">EDIT</a>
                    </div>
                </div>`;
                container.innerHTML += cardHTML;
            });
        }

        function pilihKendaraan(elemenKartu, id) {
            const semuaKartu = document.querySelectorAll('.vehicle-card');
            semuaKartu.forEach(kartu => {
                kartu.classList.remove('border-[#0141A3]', 'bg-blue-50');
                kartu.classList.add('border-transparent', 'bg-[#F5F5F5]');
            });
            elemenKartu.classList.remove('border-transparent', 'bg-[#F5F5F5]');
            elemenKartu.classList.add('border-[#0141A3]', 'bg-blue-50');
            kendaraanTerpilihId = id;
        }

        async function jadikanUtama() {
            if (!kendaraanTerpilihId) {
                alert("Silakan klik salah satu kendaraan."); return;
            }
            try {
                const response = await fetch(`http://localhost:3000/api/kendaraan/utama/${kendaraanTerpilihId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userData.id })
                });
                if(response.ok) {
                    fetchKendaraan(); // Refresh list API
                    kendaraanTerpilihId = null;
                    const alertBox = document.getElementById('alertSuccess');
                    alertBox.classList.remove('opacity-0');
                    alertBox.classList.add('opacity-100');
                    setTimeout(() => { alertBox.classList.remove('opacity-100'); alertBox.classList.add('opacity-0'); }, 2500); 
                }
            } catch (err) {
                alert('Server Error');
            }
        }
    </script>
</body>
</html>
