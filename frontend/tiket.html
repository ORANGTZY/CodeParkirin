<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F1F1F1">

    <title>Parkirin - Tiket Anda</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F1F1F1; margin: 0; overscroll-behavior-y: none; user-select: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .slide-in-right { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .nav-curve { position: absolute; top: -1px; left: 50%; transform: translateX(-50%); width: 86px; height: 38px; background-color: #F1F1F1; border-bottom-left-radius: 43px; border-bottom-right-radius: 43px; border: 1px solid #D9D9D9; border-top: none; z-index: 10; }
        .nav-curve::before, .nav-curve::after { content: ""; position: absolute; top: 0; width: 14px; height: 14px; background-color: transparent; }
        .nav-curve::before { left: -14px; border-top-right-radius: 14px; border-right: 1px solid #D9D9D9; border-top: 1px solid #D9D9D9; box-shadow: 4px -4px 0 4px #F1F1F1; }
        .nav-curve::after { right: -14px; border-top-left-radius: 14px; border-left: 1px solid #D9D9D9; border-top: 1px solid #D9D9D9; box-shadow: -4px -4px 0 4px #F1F1F1; }
    </style>
</head>
<body class="flex justify-center h-screen text-gray-800 antialiased bg-gray-200 overflow-hidden">
    <div class="w-full max-w-[402px] bg-[#F1F1F1] h-full relative flex flex-col shadow-2xl overflow-hidden slide-in-right">
        
        <div class="w-full h-[120px] bg-[#F5F5F5] pt-12 px-4 flex items-center shadow-sm z-20 shrink-0">
            <a href="user-dashboard.html" class="flex items-center text-[#0064F0] hover:opacity-80 active:scale-95 transition-all cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
            </a>
            <span class="ml-3 font-bold text-[20px] text-[#0064F0]">Daftar Tiket Aktif</span>
        </div>

        <div id="ticket-list-container" class="flex-grow overflow-y-auto hide-scrollbar z-10 flex flex-col pt-3 px-4 pb-32 relative bg-[#F1F1F1]">
            <div id="empty-state" class="w-full flex flex-col items-center mt-20 hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-300 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" /></svg>
                <p class="text-[12px] font-medium text-gray-400">Belum ada tiket yang aktif.</p>
            </div>
            
            <div id="cards-wrapper" class="w-full flex flex-col gap-3"></div>
        </div>

        <div class="absolute bottom-0 w-full max-w-[402px] h-[75px] bg-[#F5F5F5] border-t border-[#D9D9D9] rounded-t-[19px] z-20 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
            <div class="relative w-full h-full px-8 flex items-center justify-center">
                <div class="nav-curve"></div>
                <div class="flex w-full justify-between items-end pb-3 z-30">
                    <a href="user-dashboard.html" class="flex flex-col items-center justify-end w-[60px] hover:opacity-80 transition-all"><svg xmlns="http://www.w3.org/2000/svg" class="h-[28px] w-[28px] text-[#D9D9D9] mb-[5px]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z"/></svg><span class="text-[#D9D9D9] font-semibold text-[12px] leading-none">Utama</span></a>
                    <div class="flex flex-col items-center justify-end w-[60px]"><div class="h-[28px] mb-[5px]"></div><span class="text-[#00D1FF] font-semibold text-[12px] leading-none">Tiket</span></div>
                    <a href="profil.html" class="flex flex-col items-center justify-end w-[60px] hover:opacity-80 transition-all"><svg xmlns="http://www.w3.org/2000/svg" class="h-[28px] w-[28px] text-[#D9D9D9] mb-[5px]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span class="text-[#D9D9D9] font-semibold text-[12px] leading-none">Pengguna</span></a>
                </div>
                <a href="tiket.html" class="absolute top-[-26px] left-1/2 -translate-x-1/2 z-40 active:scale-95"><div class="bg-[#0141A3] w-[61px] h-[61px] rounded-full flex flex-col items-center justify-center shadow-lg"><div class="w-[32px] h-[29px] flex flex-col justify-between overflow-hidden rounded-[3px]"><div class="w-full h-[13px] bg-[#F5F5F5]"></div><div class="w-full h-[3px] bg-transparent"></div><div class="w-full h-[13px] bg-[#F5F5F5]"></div></div></div></a>
            </div>
        </div>
    </div>

    <script>
        let timerInterval = null;

        async function sinkronisasiDataTiket() {
            const userData = JSON.parse(localStorage.getItem('user'));
            if (!userData) {
                window.location.href = 'login.html';
                return;
            }

            const cardsWrapper = document.getElementById('cards-wrapper');
            const emptyElement = document.getElementById('empty-state');
            
            try {
                const cacheBuster = new Date().getTime(); 
                const response = await fetch(`http://localhost:3000/api/parkir/reservasi/user/${userData.id}?t=${cacheBuster}`);
                const result = await response.json();

                if (result.status === 'success') {
                    let localTickets = JSON.parse(localStorage.getItem('active_tickets')) || [];
                    let newSyncedTickets = [];

                    // Kita hanya mengambil tiket yang Aktif atau Menunggu
                    const activeDbTickets = result.data.filter(t => t.status === 'Aktif' || t.status === 'Menunggu');

                    cardsWrapper.innerHTML = ''; 

                    if (activeDbTickets.length === 0) {
                        emptyElement.classList.remove('hidden');
                        localStorage.setItem('active_tickets', JSON.stringify([])); 
                        if(timerInterval) clearInterval(timerInterval);
                        return;
                    } else {
                        emptyElement.classList.add('hidden');
                    }

                    activeDbTickets.forEach(dbTicket => {
                        const localData = localTickets.find(t => t.id === dbTicket.kode_unik);
                        const platNomor = localData ? localData.vehicle.plate : 'Kendaraan Anda';
                        const jenis = dbTicket.blok === 'Mobil' ? 'mobil' : 'motor';
                        
                        const isCheckedInDB = dbTicket.waktu_check_in !== null;
                        
                        // LOGIKA PINTAR: Tiket "Menunggu Keluar" dikenali jika statusnya Aktif TAPI waktu check-out-nya sudah terisi
                        const isKeluar = (dbTicket.status === 'Aktif' && dbTicket.waktu_check_out !== null);
                        
                        const estimasi = new Date(dbTicket.estimasi_kedatangan).getTime();
                        
                        // Set 10 menit timer jika statusnya Keluar
                        let exitExpiry = (localData && localData.exitExpiry) ? localData.exitExpiry : (isKeluar ? new Date(dbTicket.waktu_check_out).getTime() + (10 * 60 * 1000) : null);

                        newSyncedTickets.push({
                            id: dbTicket.kode_unik,
                            lantai: dbTicket.lantai,
                            slot: dbTicket.blok === 'Mobil' ? dbTicket.no_slot : dbTicket.blok,
                            expiry: estimasi,
                            isCheckedIn: isCheckedInDB,
                            checkInTime: dbTicket.waktu_check_in ? new Date(dbTicket.waktu_check_in).getTime() : null,
                            status: isKeluar ? 'Keluar' : dbTicket.status, // Manipulasi lokal untuk timer
                            exitExpiry: exitExpiry,
                            vehicle: localData ? localData.vehicle : { plate: platNomor, jenis: jenis, name: 'Kendaraan' }
                        });

                        // Arahkan tombol "Buka Tiket"
                        let targetUrl = isKeluar ? `tiket-keluar.html?id=${dbTicket.kode_unik}` : (isCheckedInDB ? `tiket-pembayaran.html?id=${dbTicket.kode_unik}` : `tiket-aktif.html?id=${dbTicket.kode_unik}`);
                        
                        let slotText = jenis === 'mobil' ? `${dbTicket.lantai}, Slot ${dbTicket.no_slot}` : `${dbTicket.lantai}, ${dbTicket.blok}`;
                        let labelWaktu = isKeluar ? 'Batas Waktu Keluar :' : (isCheckedInDB ? 'Status :' : 'Tiket kedaluwarsa dalam :');
                        let labelIsi = isKeluar ? 'Menghitung...' : (isCheckedInDB ? 'Sedang Parkir' : '...');

                        cardsWrapper.innerHTML += `
                        <div id="ticket-card-${dbTicket.kode_unik}" class="w-full bg-[#F5F5F5] px-4 py-3 flex flex-col justify-between shadow-sm rounded-lg border border-gray-200">
                            <div class="flex justify-between items-start w-full">
                                <div class="flex flex-col">
                                    <span class="font-bold text-[12px] text-black">Rita Supermall</span>
                                    <span class="font-normal text-[10px] text-black mt-1">${slotText}</span>
                                </div>
                                <div class="flex flex-col items-end gap-1">
                                    <span class="font-bold text-[13px] text-[#000000]">${platNomor}</span>
                                    <a id="btn-buka-${dbTicket.kode_unik}" href="${targetUrl}" class="font-bold text-[11px] text-white bg-[#0141A3] px-3 py-1 rounded-md hover:bg-blue-800 active:scale-95 transition-all">Buka Tiket</a>
                                </div>
                            </div>
                            <div class="flex items-center gap-1 mt-3 pt-2 border-t border-gray-200">
                                <span id="label-timer-${dbTicket.kode_unik}" class="font-normal text-[10px] text-black">${labelWaktu}</span>
                                <span id="timer-${dbTicket.kode_unik}" class="font-bold text-[11px] text-[#000000]">${labelIsi}</span>
                            </div>
                        </div>`;
                    });

                    localStorage.setItem('active_tickets', JSON.stringify(newSyncedTickets));
                    if(timerInterval) clearInterval(timerInterval);
                    mulaiTimerKedaluwarsa();
                }
            } catch (error) {
                console.error("Gagal menarik data dari server:", error);
            }
        }

        // FUNGSI PENGHITUNG MUNDUR (LOOP)
        function mulaiTimerKedaluwarsa() {
            timerInterval = setInterval(() => {
                const sekarang = Date.now();
                let isChanged = false;
                let currentTickets = JSON.parse(localStorage.getItem('active_tickets')) || [];

                currentTickets.forEach(ticket => {
                    const timerDisplay = document.getElementById(`timer-${ticket.id}`);
                    if (!timerDisplay) return;

                    // Jika Menunggu Scan Pintu Keluar
                    if (ticket.status === 'Keluar') {
                        const selisih = ticket.exitExpiry - sekarang;
                        if (selisih <= 0) {
                            timerDisplay.textContent = "00:00 (Segera Keluar)";
                            timerDisplay.classList.add('text-red-500');
                        } else {
                            const m = Math.floor((selisih % (1000 * 60 * 60)) / (1000 * 60));
                            const s = Math.floor((selisih % (1000 * 60)) / 1000);
                            timerDisplay.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                        }
                        return;
                    }

                    if (ticket.isCheckedIn) {
                        timerDisplay.textContent = "Sedang Parkir";
                        return; 
                    }

                    const selisihWaktu = ticket.expiry - sekarang;
                    if (selisihWaktu <= 0) {
                        const card = document.getElementById(`ticket-card-${ticket.id}`);
                        if(card) card.remove();
                        ticket.isExpired = true; 
                        isChanged = true;
                    } else {
                        const jam = Math.floor((selisihWaktu % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const menit = Math.floor((selisihWaktu % (1000 * 60 * 60)) / (1000 * 60));
                        const detik = Math.floor((selisihWaktu % (1000 * 60)) / 1000);
                        timerDisplay.textContent = `${jam}:${menit.toString().padStart(2, '0')}:${detik.toString().padStart(2, '0')}`;
                    }
                });

                if(isChanged) {
                    currentTickets = currentTickets.filter(t => !t.isExpired);
                    localStorage.setItem('active_tickets', JSON.stringify(currentTickets));
                    if(currentTickets.length === 0) document.getElementById('empty-state').classList.remove('hidden');
                }
            }, 1000);
        }

        document.addEventListener("DOMContentLoaded", sinkronisasiDataTiket);
        window.addEventListener('pageshow', (e) => {
            if (e.persisted || performance.getEntriesByType("navigation")[0].type === "back_forward") sinkronisasiDataTiket();
        });
        window.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') sinkronisasiDataTiket(); 
        });
        window.addEventListener('storage', (e) => {
            if (e.key === 'active_tickets') sinkronisasiDataTiket();
        });
    </script>
</body>
</html>
