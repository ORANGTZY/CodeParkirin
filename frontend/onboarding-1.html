<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1A73E8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <title>Parkirin - Onboarding 1</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #1A73E8; 
            background-image: radial-gradient(circle at 10% 20%, rgba(172, 198, 255, 0.2) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(126, 171, 255, 0.2) 0%, transparent 40%);
            font-family: 'Montserrat', sans-serif;
            overscroll-behavior-y: none;
        }
        
        /* Animasi masuk perlahan */
        .slide-up {
            animation: slideUp 0.6s ease-out forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex justify-center min-h-screen text-gray-800 antialiased">

    <div class="w-full max-w-[402px] flex flex-col min-h-screen relative px-4 py-8">
        
        <div class="flex justify-center items-center mb-6 mt-4 slide-up">
            <img src="./assets/img/LOGO.png" alt="Logo Parkirin" class="h-9 object-contain drop-shadow-md">
        </div>

        <div class="bg-[#EAF8FC] rounded-[15px] p-6 shadow-xl flex-grow flex flex-col items-center text-center relative slide-up" style="animation-delay: 0.1s;">
            
            <h1 class="text-[20px] font-bold text-black mt-2 mb-8 leading-snug">
                Selamat Datang <br> di PARKIRIN
            </h1>

            <img src="./assets/img/onboarding1.png" alt="Ilustrasi Parkir" class="w-full max-w-[280px] object-contain mb-8 drop-shadow-sm">

            <p class="text-[14px] font-medium text-black leading-relaxed px-1 mb-8">
                Ucapkan selamat tinggal pada stres mencari parkir. Temukan slot kosong, pesan, dan bayar hanya dalam beberapa ketukan
            </p>

            <div class="flex gap-2.5 mt-auto mb-8 justify-center items-center">
                <div class="w-7 h-[10px] bg-[#0064F0] rounded-full transition-all"></div>
                <div class="w-[10px] h-[10px] bg-[#D9D9D9] rounded-full transition-all"></div>
            </div>

            <a href="onboarding-2.html" class="w-full">
                <button class="w-full bg-[#0141A3] hover:bg-blue-900 text-white font-semibold text-[13px] h-[48px] rounded-[10px] shadow-md transition-all active:scale-95">
                    Lanjut
                </button>
            </a>

        </div>
    </div>

</body>
</html>
