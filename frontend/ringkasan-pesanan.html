<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F5F5F5">
    <title>Parkirin - Pesanan Anda</title>
    
    <link rel="icon" href="assets/img/favicon.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F1F1F1; margin: 0; overscroll-behavior-y: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .slide-in-right { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { 
            from { opacity: 0; transform: translateX(20px); } 
            to { opacity: 1; transform: translateX(0); } 
        }
    </style>
</head>
<body class="flex justify-center h-screen text-gray-800 antialiased bg-gray-200 overflow-hidden">

    <div class="w-full max-w-[402px] bg-[#F1F1F1] h-full relative flex flex-col shadow-2xl overflow-hidden slide-in-right">
        
        <div class="w-full h-[120px] bg-[#F5F5F5] pt-12 px-4 flex items-center shadow-sm z-20 shrink-0">
            <a href="javascript:history.back()" class="flex items-center text-[#0064F0] hover:opacity-80 active:scale-95 transition-all cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
            <span class="ml-2 font-bold text-[20px] text-[#0064F0]">Pesanan Anda</span>
        </div>

        <div class="flex-grow overflow-y-auto hide-scrollbar z-10 flex flex-col pt-4 pb-28 relative">
            
            <div class="w-full bg-[#F5F5F5] px-4 py-4 mb-4">
                <h2 class="font-semibold text-[16px] text-black mb-3">Tempat Parkir</h2>
                
                <div class="bg-[#F5F5F5] border border-[#D9D9D9] rounded-[11px] p-4 relative">
                    <span id="display-date" class="font-semibold text-[10px] text-[#9E9898] block mb-2">Memuat...</span>
                    
                    <div class="flex justify-between items-start mt-1">
                        <div class="flex flex-col gap-1">
                            <span class="font-semibold text-[14px] text-black">Rita Supermall</span>
                            <span id="display-slot" class="font-normal text-[13px] text-black">Memuat Slot...</span>
                        </div>
                        <div class="flex flex-col gap-1 text-right">
                            <span id="display-vehicle-name" class="font-semibold text-[14px] text-black">Memuat...</span>
                            <span id="display-vehicle-plate" class="font-medium text-[14px] text-black">...</span>
                        </div>
                    </div>
                </div>
                
                <span class="font-medium text-[10px] text-[#FF0000] mt-2 block pl-1">Note: Tiket akan hangus jika melewati batas waktu 2 jam, Tiket tidak dapat digunakan untuk kendaraan lain.</span>
            </div>

            <div class="w-full bg-[#F5F5F5] px-4 py-4 flex-grow">
                <h2 class="font-semibold text-[16px] text-black mb-3">Rincian Harga</h2>
                
                <div class="bg-[#F5F5F5] border border-[#D9D9D9] rounded-[11px] p-4 flex flex-col">
                    <span id="display-slot-price" class="font-semibold text-[14px] text-black mb-4">Memuat Slot...</span>
                    
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-normal text-[13px] text-black">Jam Pertama</span>
                        <span id="price-first-hour" class="font-bold text-[13px] text-black">...</span>
                    </div>
                    
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-normal text-[13px] text-[#9E9898]">Jam Berikutnya</span>
                        <span id="price-next-hour" class="font-semibold text-[13px] text-[#9E9898]">...</span>
                    </div>

                    <div class="w-full border-t-2 border-dashed border-[#D9D9D9] my-4"></div>

                    <div class="w-full bg-[#E3E1ED] rounded-[10px] flex justify-between items-center px-4 py-2 mt-2">
                        <span class="font-semibold text-[14px] text-black">Total Tagihan Sementara</span>
                        <span id="price-total" class="font-bold text-[13px] text-[#9E9898]">...</span>
                    </div>
                </div>
            </div>

        </div>

        <div class="absolute bottom-0 w-full h-[89px] bg-[#F1F1F1] flex flex-col justify-center px-4 z-20 pb-4">
            <button onclick="prosesPesanan()" class="w-full h-[60px] bg-[#0141A3] hover:bg-blue-800 rounded-[10px] flex items-center justify-center transition-all active:scale-95 shadow-[0_4px_6px_-1px_rgba(0,0,0,0.1)]">
                <span class="text-white font-semibold text-[14px] tracking-wide">Pesan Tiket</span>
            </button>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            const d = new Date();
            document.getElementById('display-date').textContent = `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

            const vehicle = JSON.parse(localStorage.getItem('booking_vehicle'));
            const slot = localStorage.getItem('booking_slot');
            const lantai = localStorage.getItem('booking_lantai') || 'Lantai B';

            if(vehicle) {
                document.getElementById('display-vehicle-name').textContent = vehicle.name;
                document.getElementById('display-vehicle-plate').textContent = vehicle.plate;
            }

            if(slot) {
                let slotText = "";
                // MENGGABUNGKAN DATA LANTAI DENGAN DATA SLOT
                // Catatan: property pada localStorage adalah 'jenis'
                if(vehicle && vehicle.jenis === 'mobil') {
                     slotText = `${lantai}, Slot ${slot}`;
                } else {
                     slotText = `${lantai}, ${slot}`; 
                }
                
                document.getElementById('display-slot').textContent = slotText;
                document.getElementById('display-slot-price').textContent = slotText;
            }

            if(vehicle) {
                // Memanggil fungsi fetchTarif dari database
                fetchTarif(vehicle.jenis);
            }
        });

        // FUNGSI UNTUK MENGAMBIL TARIF DARI DATABASE
        async function fetchTarif(jenisKendaraan) {
            try {
                // Panggil API endpoint tarif
                const response = await fetch('http://localhost:3000/api/tarif');
                const result = await response.json();
                
                if(result.data && result.data.length > 0) {
                    // Cari data tarif yang cocok dengan jenis kendaraan (motor / mobil)
                    const tarif = result.data.find(item => item.jenis_kendaraan.toLowerCase() === jenisKendaraan.toLowerCase());
                    
                    if (tarif) {
                        const hargaPertama = tarif.tarif_jam_pertama.toLocaleString('id-ID');
                        const hargaBerikutnya = tarif.tarif_jam_berikutnya.toLocaleString('id-ID');

                        // Masukkan ke dalam HTML
                        document.getElementById('price-first-hour').textContent = hargaPertama;
                        document.getElementById('price-next-hour').textContent = hargaBerikutnya;
                        document.getElementById('price-total').textContent = hargaPertama; // Total tagihan awal biasanya sama dengan jam pertama
                    }
                }
            } catch (error) {
                console.error('Gagal mengambil data tarif dari server:', error);
                
                // Fallback (Nilai Cadangan) jika server database mati
                if(jenisKendaraan === 'mobil') {
                    document.getElementById('price-first-hour').textContent = "10.000";
                    document.getElementById('price-next-hour').textContent = "2.000";
                    document.getElementById('price-total').textContent = "10.000";
                } else {
                    document.getElementById('price-first-hour').textContent = "3.000";
                    document.getElementById('price-next-hour').textContent = "1.000";
                    document.getElementById('price-total').textContent = "3.000";
                }
            }
        }

        function prosesPesanan() {
            // Alihkan pengguna ke halaman PIN
            window.location.href = 'konfirmasi-pin.html'; 
        }
    </script>
</body>
</html>
