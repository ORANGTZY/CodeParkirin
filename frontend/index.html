<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1A73E8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Parkirin - Welcome</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Montserrat+Alternates:wght@600&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Background biru dengan efek elips/gelombang yang responsif */
            background-color: #1A73E8; 
            background-image: radial-gradient(ellipse at 30% 40%, rgba(172, 198, 255, 0.25) 0%, transparent 50%),
                              radial-gradient(ellipse at 70% 60%, rgba(126, 171, 255, 0.2) 0%, transparent 50%);
            font-family: 'Montserrat', sans-serif;
            overscroll-behavior-y: none;
            margin: 0;
            overflow: hidden; /* Mencegah layar bisa di-scroll */
        }
        
        .font-alt { font-family: 'Montserrat Alternates', sans-serif; }

        /* Animasi fade in saat web dibuka */
        .fade-in {
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Animasi khusus untuk loading dots */
        .dot-bounce {
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot-1 { animation-delay: -0.32s; }
        .dot-2 { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen text-gray-800 antialiased relative">

    <svg xmlns="http://www.w3.org/2000/svg" class="absolute top-24 left-8 w-28 h-28 text-white opacity-5 transform -rotate-12 pointer-events-none" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
    </svg>

    <svg xmlns="http://www.w3.org/2000/svg" class="absolute top-36 -right-6 w-36 h-36 text-white opacity-5 transform rotate-12 pointer-events-none" fill="currentColor" viewBox="0 0 24 24">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-6 10h-2v4H9V7h4.5c1.93 0 3.5 1.57 3.5 3.5S15.43 13 13 13zm0-4h-2v2h2c.55 0 1-.45 1-1s-.45-1-1-1z"/>
    </svg>

    <svg xmlns="http://www.w3.org/2000/svg" class="absolute bottom-48 right-4 w-32 h-32 text-white opacity-5 transform rotate-6 pointer-events-none" fill="currentColor" viewBox="0 0 24 24">
        <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.85 7h10.29l1.08 3.11H5.77L6.85 7zM19 17H5v-5h14v5z"/>
        <circle cx="7.5" cy="14.5" r="1.5"/>
        <circle cx="16.5" cy="14.5" r="1.5"/>
    </svg>

    <img src="./assets/img/elemenmotorcycle.png" alt="Elemen Motor" class="absolute bottom-20 -left-6 w-40 h-40 opacity-5 transform -rotate-12 pointer-events-none object-contain">


    <div class="w-full max-w-[402px] flex flex-col justify-center items-center min-h-screen relative px-4 fade-in z-10">
        
        <img src="./assets/img/LOGO.png" alt="Logo Parkirin" class="h-12 md:h-14 object-contain drop-shadow-xl mb-4">
        
        <h2 class="font-alt text-white/90 text-[12px] md:text-[14px] font-bold tracking-[0.2em] uppercase text-center drop-shadow-md">
            Smart Parking System
        </h2>

        <div class="flex space-x-2 mt-12">
            <div class="w-2.5 h-2.5 bg-white rounded-full dot-bounce dot-1 shadow-sm"></div>
            <div class="w-2.5 h-2.5 bg-white rounded-full dot-bounce dot-2 shadow-sm"></div>
            <div class="w-2.5 h-2.5 bg-white rounded-full dot-bounce shadow-sm"></div>
        </div>
        
    </div>

    <div class="absolute bottom-8 w-full text-center z-10 fade-in">
        <p class="text-white/50 text-[10px] font-semibold tracking-wider">VERSI 1.0.0</p>
    </div>

    <script>
        // Splash screen tampil selama 3 detik agar animasi loading sempat terlihat
        const SPLASH_DURATION = 3000; 

        setTimeout(() => {
            // Mengarahkan SEMUA pengguna ke Onboarding 1
            window.location.href = 'onboarding-1.html';
        }, SPLASH_DURATION);
    </script>
</body>
</html>
