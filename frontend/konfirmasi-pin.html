<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F1F1F1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <title>Parkirin - Masukkan PIN</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F1F1F1; margin: 0; overscroll-behavior-y: none; user-select: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .slide-in-right { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .keypad-btn { transition: background-color 0.1s, transform 0.1s; }
        .keypad-btn:active, .keypad-btn.keyboard-active { background-color: #E5E5E5; transform: scale(0.9); }
        .pin-dot { transition: background-color 0.2s ease-in-out, transform 0.2s ease-in-out; }
        .pin-dot.active { background-color: #0064F0; transform: scale(1.1); }
        .keypad-hidden { transform: translateY(calc(100% - 35px)); }
        
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="flex justify-center h-screen text-gray-800 antialiased bg-gray-200 overflow-hidden">

    <div class="w-full max-w-[402px] bg-[#F1F1F1] h-full relative flex flex-col shadow-2xl overflow-hidden slide-in-right">
        
        <div class="w-full h-[120px] bg-[#F5F5F5] pt-12 px-4 flex items-center z-20 shrink-0 border-b border-gray-200 shadow-sm">
            <button onclick="history.back()" class="flex items-center text-[#0064F0] hover:opacity-80 active:scale-95 transition-all cursor-pointer bg-transparent border-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-[31px] w-[31px] stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
                <span class="ml-2 font-bold text-[20px] leading-[24px]">Konfirmasi PIN</span>
            </button>
        </div>

        <div class="flex-grow flex flex-col justify-between relative z-10">
            
            <div onclick="showKeypad()" class="flex flex-col items-center w-full pt-16 pb-8 flex-grow cursor-pointer">
                <h2 class="font-semibold text-[20px] leading-[24px] text-[#0F252A] mb-2">Masukkan PIN Anda</h2>
                <p id="error-text" class="text-[12px] text-red-500 font-medium mb-4 opacity-0 transition-opacity">PIN yang Anda masukkan salah.</p>
                
                <div id="dot-container" class="flex gap-[20px]">
                    <div id="dot-1" class="pin-dot w-[25px] h-[25px] rounded-full bg-[#D9D9D9]"></div>
                    <div id="dot-2" class="pin-dot w-[25px] h-[25px] rounded-full bg-[#D9D9D9]"></div>
                    <div id="dot-3" class="pin-dot w-[25px] h-[25px] rounded-full bg-[#D9D9D9]"></div>
                    <div id="dot-4" class="pin-dot w-[25px] h-[25px] rounded-full bg-[#D9D9D9]"></div>
                    <div id="dot-5" class="pin-dot w-[25px] h-[25px] rounded-full bg-[#D9D9D9]"></div>
                    <div id="dot-6" class="pin-dot w-[25px] h-[25px] rounded-full bg-[#D9D9D9]"></div>
                </div>
                
                <p id="hint-text" class="text-[10px] text-gray-400 mt-10 opacity-0 transition-opacity duration-300">Ketuk layar untuk memunculkan keypad</p>
            </div>

            <div id="keypad-container" class="w-full bg-white rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.08)] px-8 pt-2 pb-10 flex-shrink-0 transition-transform duration-300 ease-in-out">
                <div onclick="toggleKeypad(event)" class="w-full py-4 cursor-pointer flex justify-center group" title="Tarik ke bawah/atas">
                    <div class="w-12 h-1.5 bg-gray-200 rounded-full group-hover:bg-gray-300 transition-colors"></div>
                </div>

                <div class="grid grid-cols-3 gap-y-6 gap-x-8 text-center place-items-center">
                    <button data-key="1" onclick="addNumber('1')" class="keypad-btn w-16 h-16 rounded-full flex items-center justify-center text-[28px] font-medium text-black">1</button>
                    <button data-key="2" onclick="addNumber('2')" class="keypad-btn w-16 h-16 rounded-full flex items-center justify-center text-[28px] font-medium text-black">2</button>
                    <button data-key="3" onclick="addNumber('3')" class="keypad-btn w-16 h-16 rounded-full flex items-center justify-center text-[28px] font-medium text-black">3</button>

                    <button data-key="4" onclick="addNumber('4')" class="keypad-btn w-16 h-16 rounded-full flex items-center justify-center text-[28px] font-medium text-black">4</button>
                    <button data-key="5" onclick="addNumber('5')" class="keypad-btn w-16 h-16 rounded-full flex items-center justify-center text-[28px] font-medium text-black">5</button>
                    <button data-key="6" onclick="addNumber('6')" class="keypad-btn w-16 h-16 rounded-full flex items-center justify-center text-[28px] font-medium text-black">6</button>

                    <button data-key="7" onclick="addNumber('7')" class="keypad-btn w-16 h-16 rounded-full flex items-center justify-center text-[28px] font-medium text-black">7</button>
                    <button data-key="8" onclick="addNumber('8')" class="keypad-btn w-16 h-16 rounded-full flex items-center justify-center text-[28px] font-medium text-black">8</button>
                    <button data-key="9" onclick="addNumber('9')" class="keypad-btn w-16 h-16 rounded-full flex items-center justify-center text-[28px] font-medium text-black">9</button>

                    <button class="keypad-btn w-16 h-16 rounded-full flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-[#1D1D1B]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4" />
                        </svg>
                    </button>
                    <button data-key="0" onclick="addNumber('0')" class="keypad-btn w-16 h-16 rounded-full flex items-center justify-center text-[28px] font-medium text-black">0</button>
                    <button data-key="backspace" onclick="removeNumber()" class="keypad-btn w-16 h-16 rounded-full flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-[#546A7B]" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M6.707 4.879A3 3 0 018.828 4H15a3 3 0 013 3v6a3 3 0 01-3 3H8.828a3 3 0 01-2.12-.879l-4.415-4.414a1 1 0 010-1.414l4.414-4.414zm4 2.414a1 1 0 00-1.414 1.414L10.586 10l-1.293 1.293a1 1 0 101.414 1.414L12 11.414l1.293 1.293a1 1 0 001.414-1.414L13.414 10l1.293-1.293a1 1 0 00-1.414-1.414L12 8.586l-1.293-1.293z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </div>

        </div>

        <div id="successModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black bg-opacity-40 backdrop-blur-sm transition-opacity opacity-0">
            <div id="successModalContent" class="bg-white w-[280px] rounded-[20px] p-6 flex flex-col items-center shadow-2xl transform scale-90 transition-transform duration-300">
                <div class="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h3 class="text-[18px] font-bold text-black mb-2 text-center">Berhasil!</h3>
                <p class="text-[12px] font-medium text-gray-500 text-center mb-6 leading-relaxed">Pesanan tiket parkir Anda berhasil dibuat. Segera menuju ke lokasi.</p>
                <button onclick="finishSetup()" class="w-full bg-[#0064F0] hover:bg-blue-700 text-white font-bold py-2.5 rounded-[12px] text-[12px] transition-colors shadow-md active:scale-95">
                    Lihat Tiket Saya
                </button>
            </div>
        </div>

    </div>

    <script>
        let currentPin = "";
        const MAX_PIN_LENGTH = 6;
        let isKeypadVisible = true;
        let latestTicketId = "";

        // Deteksi apakah halaman ini dibuka dari alur scan-ditempat
        const _urlParams  = new URLSearchParams(window.location.search);
        const _sourceScan = _urlParams.get('source') === 'scan' || sessionStorage.getItem('scan_source') === 'scan';

        // ============================================================
        // FUNGSI KHUSUS ALUR SCAN-DITEMPAT
        // Setelah PIN benar: booking ke DB → bypass-masuk → tiket-pembayaran
        // ============================================================
        async function prosesScanMasukAPI() {
            const user    = JSON.parse(localStorage.getItem('user'));
            const vehicle = JSON.parse(localStorage.getItem('booking_vehicle'));
            const lantai  = localStorage.getItem('booking_lantai') || 'Lantai B1';
            const slotName = localStorage.getItem('booking_slot') || '';

            if (!user || !user.id) {
                alert("Sesi login tidak valid. Silakan login ulang.");
                window.location.href = 'login.html';
                return;
            }
            if (!vehicle) {
                alert("Data kendaraan tidak ditemukan. Ulangi dari halaman scan.");
                window.location.href = 'scan-ditempat.html';
                return;
            }

            // LANGKAH 1: Booking tiket ke database
            const payload = {
                user_id: user.id,
                area_id: 1,
                jenis_kendaraan: (vehicle.jenis || 'mobil').toLowerCase(),
                lantai: lantai,
                slot_name: slotName,
                kendaraan_id: vehicle.id || null
            };

            try {
                const resBooking = await fetch('http://localhost:3000/api/parkir/booking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const resultBooking = await resBooking.json();

                if (!resBooking.ok || resultBooking.status !== 'success') {
                    const msg = resultBooking.message || resultBooking.error || 'Gagal membuat tiket parkir.';
                    alert("Gagal booking: " + msg);
                    currentPin = ""; updateDots();
                    return;
                }

                const kodeUnik = resultBooking.kode_unik;

                // LANGKAH 2: Langsung scan masuk (bypass-masuk) ke database
                const resBypass = await fetch('http://localhost:3000/api/parkir/bypass-masuk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ kode_unik: kodeUnik, menit_parkir: 0 })
                });

                if (!resBypass.ok) {
                    alert("Tiket dibuat tapi gagal scan masuk. Gunakan halaman tiket untuk scan manual.");
                    window.location.href = `tiket-aktif.html?id=${kodeUnik}`;
                    return;
                }

                // LANGKAH 3: Bersihkan data sementara
                localStorage.removeItem('booking_vehicle');
                localStorage.removeItem('booking_lantai');
                localStorage.removeItem('booking_slot');
                sessionStorage.removeItem('scan_source');

                // Update localStorage tiket aktif agar sinkron dengan tiket.html
                let activeTickets = JSON.parse(localStorage.getItem('active_tickets')) || [];
                activeTickets.push({
                    id: kodeUnik,
                    expiry: Date.now() + (2 * 60 * 60 * 1000),
                    isCheckedIn: true,
                    checkInTime: Date.now(),
                    vehicle: vehicle,
                    lantai: lantai,
                    slot: resultBooking.assigned_slot || slotName || 'Otomatis'
                });
                localStorage.setItem('active_tickets', JSON.stringify(activeTickets));

                // LANGKAH 4: Langsung ke halaman pembayaran (durasi parkir langsung berjalan)
                window.location.href = `tiket-pembayaran.html?id=${kodeUnik}`;

            } catch (e) {
                console.error("Error Scan Masuk:", e);
                alert("Gagal koneksi ke server. Pastikan backend berjalan.");
                currentPin = ""; updateDots();
            }
        }

        async function prosesBookingAPI() {
            const user = JSON.parse(localStorage.getItem('user'));
            let vehicle = JSON.parse(localStorage.getItem('booking_vehicle'));
            
            if (!user || !user.id) {
                alert("Sesi login Anda tidak valid. Silakan login ulang.");
                window.location.href = 'login.html';
                return;
            }

            // PENGAMAN JIKA VEHICLE KOSONG
            if (!vehicle) {
                vehicle = { id: null, jenis: 'mobil', name: 'Kendaraan Anda', plate: 'Plat' }; 
            }
            
            const lantai = localStorage.getItem('booking_lantai') || 'Lantai B1';
            const slotName = localStorage.getItem('booking_slot') || '';

            // STRUKTUR DATA YG DIKIRIM (Sudah menyertakan kendaraan_id)
            const payload = {
                user_id: user.id,
                area_id: 1, 
                jenis_kendaraan: (vehicle.jenis || 'mobil').toLowerCase(),
                lantai: lantai,
                slot_name: slotName,
                kendaraan_id: vehicle.id || null 
            };

            try {
                const response = await fetch('http://localhost:3000/api/parkir/booking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (response.ok && result.status === "success") {
                    latestTicketId = result.kode_unik;

                    let activeTickets = JSON.parse(localStorage.getItem('active_tickets')) || [];
                    const newTicket = {
                        id: result.kode_unik,
                        expiry: Date.now() + (2 * 60 * 60 * 1000), 
                        vehicle: vehicle,
                        lantai: payload.lantai,
                        slot: result.assigned_slot || payload.slot_name || 'Otomatis' 
                    };
                    activeTickets.push(newTicket);
                    localStorage.setItem('active_tickets', JSON.stringify(activeTickets));

                    localStorage.removeItem('booking_vehicle');
                    localStorage.removeItem('booking_lantai');
                    localStorage.removeItem('booking_slot');

                    showSuccessModal();
                } else {
                    const errorMsg = result.message || result.error || "Gagal menyimpan data ke server.";
                    alert("Pesan Sistem: " + errorMsg);
                    
                    currentPin = ""; updateDots();
                    if (typeof toggleKeypad === 'function') toggleKeypad();
                }
            } catch (e) {
                console.error("Error Koneksi Booking:", e);
                alert("Gagal koneksi ke server reservasi. Pastikan Backend berjalan.");
                currentPin = ""; updateDots();
                if (typeof toggleKeypad === 'function') toggleKeypad();
            }
        }

        function finishSetup() {
            window.location.href = `tiket-aktif.html?id=${latestTicketId}`;
        }

        function toggleKeypad(event) {
            if(event) event.stopPropagation(); 
            const keypad = document.getElementById('keypad-container');
            const hint = document.getElementById('hint-text');

            if (isKeypadVisible) {
                keypad.classList.add('keypad-hidden');
                hint.classList.remove('opacity-0');
                hint.classList.add('opacity-100');
            } else {
                keypad.classList.remove('keypad-hidden');
                hint.classList.add('opacity-0');
                hint.classList.remove('opacity-100');
            }
            isKeypadVisible = !isKeypadVisible;
        }

        function showKeypad() {
            if (!isKeypadVisible) {
                const keypad = document.getElementById('keypad-container');
                const hint = document.getElementById('hint-text');
                keypad.classList.remove('keypad-hidden');
                hint.classList.add('opacity-0');
                hint.classList.remove('opacity-100');
                isKeypadVisible = true;
            }
        }

        function updateDots() {
            for (let i = 1; i <= MAX_PIN_LENGTH; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (i <= currentPin.length) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            }
        }

        function addNumber(num) {
            document.getElementById('error-text').classList.remove('opacity-100');
            document.getElementById('error-text').classList.add('opacity-0');

            showKeypad(); 
            if (currentPin.length < MAX_PIN_LENGTH) {
                currentPin += num;
                updateDots();

                if (currentPin.length === MAX_PIN_LENGTH) {
                    setTimeout(() => {
                        verifikasiPin();
                    }, 300);
                }
            }
        }

        function removeNumber() {
            showKeypad();
            if (currentPin.length > 0) {
                currentPin = currentPin.slice(0, -1);
                updateDots();
            }
        }

        async function verifikasiPin() {
            let user = JSON.parse(localStorage.getItem('user'));
            
            if (!user || !user.id) {
                alert("Sesi Anda telah habis. Silakan login kembali.");
                window.location.href = 'login.html';
                return;
            }

            try {
                // Menyesuaikan route auth berdasarkan server.js
                const response = await fetch('http://localhost:3000/api/verify-pin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: user.id, pin: currentPin })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    // Jika dari alur scan-ditempat → booking + bypass-masuk langsung ke pembayaran
                    if (_sourceScan) {
                        prosesScanMasukAPI();
                    } else {
                        prosesBookingAPI();
                    }
                } else if (response.status === 404) {
                    alert("Anda belum mengatur PIN. Silakan atur PIN di menu Profil terlebih dahulu.");
                    window.location.href = 'atur-pin.html';
                } else {
                    pinSalah();
                }
            } catch (error) {
                alert("Gagal memverifikasi PIN. Pastikan server menyala.");
                currentPin = ""; updateDots();
            }
        }

        function pinSalah() {
            document.getElementById('error-text').classList.remove('opacity-0');
            document.getElementById('error-text').classList.add('opacity-100');

            const dotContainer = document.getElementById('dot-container');
            dotContainer.classList.add('shake');
            
            setTimeout(() => {
                dotContainer.classList.remove('shake');
                currentPin = ""; 
                updateDots();
            }, 500);
        }

        function showSuccessModal() {
            const modal = document.getElementById('successModal');
            const modalContent = document.getElementById('successModalContent');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                modalContent.classList.remove('scale-90');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        document.addEventListener('keydown', function(event) {
            const modal = document.getElementById('successModal');
            if (!modal.classList.contains('hidden')) return;

            if (event.key >= '0' && event.key <= '9') {
                addNumber(event.key);
                triggerVisualKeystroke(event.key);
            } 
            else if (event.key === 'Backspace') {
                removeNumber();
                triggerVisualKeystroke('backspace');
            }
        });

        function triggerVisualKeystroke(key) {
            const btn = document.querySelector(`button[data-key="${key}"]`);
            if (btn) {
                btn.classList.add('keyboard-active');
                setTimeout(() => {
                    btn.classList.remove('keyboard-active');
                }, 100);
            }
        }

        // Update teks halaman jika dibuka dari alur scan-ditempat
        document.addEventListener('DOMContentLoaded', () => {
            if (_sourceScan) {
                const headerSpan = document.querySelector('span.font-bold.text-\\[20px\\]');
                const h2 = document.querySelector('h2.font-semibold');
                if (headerSpan) headerSpan.textContent = 'Konfirmasi PIN';
                if (h2) h2.textContent = 'Masukkan PIN Anda';
            }
        });
    </script>
</body>
</html>
