<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F5F5F5">
    
    <title>Parkirin - Pilih Kendaraan</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F1F1F1; margin: 0; overscroll-behavior-y: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .slide-in-right { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .vehicle-card { transition: all 0.2s ease-in-out; border: 2px solid transparent; }
        .vehicle-card.selected { background-color: #D8F6FF !important; border-color: #0064F0 !important; transform: scale(0.98); }
    </style>
</head>
<body class="flex justify-center h-screen text-gray-800 antialiased bg-gray-200 overflow-hidden">

    <div class="w-full max-w-[402px] bg-[#F1F1F1] h-full relative flex flex-col shadow-2xl overflow-hidden slide-in-right">
        
        <div class="w-full h-[120px] bg-[#F5F5F5] pt-12 px-4 flex items-center shadow-sm z-20 shrink-0">
            <button onclick="history.back()" class="flex items-center text-[#0064F0] hover:opacity-80 active:scale-95 transition-all cursor-pointer bg-transparent border-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <span class="ml-2 font-bold text-[20px] text-[#0064F0]">Pilih Kendaraan</span>
        </div>

        <div class="flex-grow overflow-y-auto hide-scrollbar z-10 flex flex-col pt-4 pb-28 relative">
            
            <div id="vehicle-list" class="w-full flex flex-col px-4 gap-3">
                <p class="text-center text-[12px] font-medium text-gray-500 mt-10">Memuat kendaraan Anda...</p>
            </div>

            <div class="w-full px-4 mt-4">
                <a href="kendaraan.html" class="flex items-center justify-center gap-2 w-full py-3 border-2 border-dashed border-[#A3ABC4] rounded-[10px] text-[#A3ABC4] hover:bg-blue-50 hover:border-[#0064F0] hover:text-[#0064F0] transition-colors cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    <span class="font-bold text-[12px]">Tambah Kendaraan Baru</span>
                </a>
            </div>

        </div>

        <div class="absolute bottom-0 w-full h-[89px] bg-[#F5F5F5] flex flex-col justify-center px-8 z-20 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] border-t border-gray-200">
            <button id="btn-lanjutkan" onclick="lanjutkanBooking()" disabled class="w-full h-[47px] bg-[#D9D9D9] rounded-[10px] flex items-center justify-center transition-all duration-300 shadow-sm cursor-not-allowed">
                <span class="text-white font-semibold text-[13px] tracking-wide">Lanjutkan</span>
            </button>
        </div>

        <div id="customModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black bg-opacity-40 backdrop-blur-sm transition-opacity opacity-0">
            <div id="customModalContent" class="bg-white w-[280px] rounded-[20px] p-6 flex flex-col items-center shadow-2xl transform scale-90 transition-transform duration-300">
                <div class="w-14 h-14 bg-orange-100 rounded-full flex items-center justify-center mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <h3 id="modalTitle" class="text-[18px] font-bold text-black mb-2 text-center">Perhatian</h3>
                <p id="modalMessage" class="text-[12px] font-medium text-gray-500 text-center mb-6 leading-relaxed">Pesan modal disini</p>
                <button onclick="closeCustomAlert()" class="w-full bg-[#0141A3] hover:bg-blue-800 text-white font-bold py-2.5 rounded-[12px] text-[12px] transition-colors shadow-md active:scale-95">
                    Mengerti
                </button>
            </div>
        </div>

    </div>

    <script>
        let selectedVehicleData = null;
        let userData = JSON.parse(localStorage.getItem('user'));

        // Deteksi apakah dibuka dari alur scan-ditempat
        const _urlParams  = new URLSearchParams(window.location.search);
        const _sourceScan = _urlParams.get('source') === 'scan' || sessionStorage.getItem('scan_source') === 'scan';

        document.addEventListener("DOMContentLoaded", () => {
            if (!userData) {
                alert("Anda belum login.");
                window.location.href = 'login.html';
                return;
            }
            fetchDataDanSinkronisasi();
        });

        function showCustomAlert(title, message) {
            const modal = document.getElementById('customModal');
            const modalContent = document.getElementById('customModalContent');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                modalContent.classList.remove('scale-90');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeCustomAlert() {
            const modal = document.getElementById('customModal');
            const modalContent = document.getElementById('customModalContent');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        async function fetchDataDanSinkronisasi() {
            try {
                const resKendaraan = await fetch(`http://localhost:3000/api/kendaraan/${userData.id}`);
                const resultKendaraan = await resKendaraan.json();

                const resReservasi = await fetch(`http://localhost:3000/api/parkir/reservasi/user/${userData.id}`);
                const resultReservasi = await resReservasi.json();

                let activeTicketsLocal = JSON.parse(localStorage.getItem('active_tickets')) || [];
                
                if (resultReservasi.status === 'success') {
                    activeTicketsLocal = activeTicketsLocal.filter(localTicket => {
                        const dbMatch = resultReservasi.data.find(dbItem => dbItem.kode_unik === localTicket.id);
                        return dbMatch && (dbMatch.status === 'Aktif' || dbMatch.status === 'Menunggu');
                    });
                    localStorage.setItem('active_tickets', JSON.stringify(activeTicketsLocal));
                }

                renderKendaraan(resultKendaraan.data || [], activeTicketsLocal);
            } catch (err) {
                console.error("Gagal load data", err);
                document.getElementById('vehicle-list').innerHTML = `<p class="text-center text-[12px] font-medium text-red-500 mt-10">Gagal mengambil data. Pastikan server aktif.</p>`;
            }
        }

        function renderKendaraan(daftarKendaraan, activeTicketsLocal) {
            const container = document.getElementById('vehicle-list');
            container.innerHTML = ''; 

            if (daftarKendaraan.length === 0) {
                container.innerHTML = `<p class="text-center text-[12px] font-medium text-gray-500 mt-10">Anda belum mendaftarkan kendaraan.</p>`;
                return;
            }

            const activePlates = activeTicketsLocal.map(t => t.vehicle.plate);

            daftarKendaraan.forEach((kendaraan) => {
                const isUtamaHidden = kendaraan.is_utama ? '' : 'hidden';
                const vehicleName = `${kendaraan.merek} ${kendaraan.model}`;
                
                let jenis = kendaraan.jenis ? kendaraan.jenis.toLowerCase() : '';
                if(!jenis) {
                    jenis = (vehicleName.toLowerCase().includes('yamaha') || vehicleName.toLowerCase().includes('honda') || vehicleName.toLowerCase().includes('suzuki')) ? 'motor' : 'mobil';
                }
                
                const isParked = activePlates.includes(kendaraan.plat);
                
                const clickHandler = isParked 
                    ? `onclick="showCustomAlert('Gagal Memilih', 'Kendaraan dengan plat ${kendaraan.plat} sedang dalam pesanan aktif. Gunakan kendaraan lain.')"` 
                    : `onclick="selectVehicle('vehicle-${kendaraan.id}', ${kendaraan.id}, '${vehicleName}', '${kendaraan.plat}', '${jenis}')"`;
                
                const cardStyle = isParked 
                    ? `opacity-60 bg-gray-200 cursor-not-allowed` 
                    : `bg-[#F5F5F5] hover:bg-gray-100 cursor-pointer`;

                const badgeParkirHTML = isParked 
                    ? `<span class="bg-red-100 text-red-600 text-[9px] font-bold px-2 py-0.5 rounded-md ml-1 border border-red-200">Dalam Pesanan</span>` 
                    : ``;

                const cardHTML = `
                <div id="vehicle-${kendaraan.id}" ${clickHandler} class="vehicle-card w-full h-[82px] ${cardStyle} flex items-center px-4 rounded-[10px]">
                    <div class="w-[91px] h-[53px] bg-[#0F172A] border-[3px] border-[#D9D9D9] rounded-[5px] flex items-center justify-center shrink-0 shadow-sm relative overflow-hidden">
                        <div class="absolute inset-0 border-2 border-[#0F172A] rounded-[3px]"></div>
                        <span class="font-semibold text-[12px] text-white tracking-wide">${kendaraan.plat}</span>
                    </div>
                    
                    <div class="ml-4 flex-grow">
                        <div class="flex items-center gap-1 flex-wrap">
                            <span class="font-semibold text-[12px] text-black leading-tight truncate max-w-[120px]">${vehicleName}</span>
                            ${badgeParkirHTML}
                            <div class="flex items-center gap-1 ${isUtamaHidden}">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-[#0062E6]" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                </svg>
                                <span class="font-medium text-[10px] text-black">Utama</span>
                            </div>
                        </div>
                        <span class="font-medium text-[10px] text-gray-500 block mt-0.5">${kendaraan.warna}</span>
                    </div>
                </div>`;
                
                container.innerHTML += cardHTML;
            });
        }

        function selectVehicle(elementId, vehicleId, vehicleName, plateNumber, jenisKendaraan) {
            const allCards = document.querySelectorAll('.vehicle-card');
            allCards.forEach(card => card.classList.remove('selected'));

            const selectedCard = document.getElementById(elementId);
            selectedCard.classList.add('selected');

            selectedVehicleData = {
                id: vehicleId,
                name: vehicleName,
                plate: plateNumber,
                jenis: jenisKendaraan
            };

            const btn = document.getElementById('btn-lanjutkan');
            btn.disabled = false;
            btn.classList.remove('bg-[#D9D9D9]', 'cursor-not-allowed');
            btn.classList.add('bg-[#0141A3]/80', 'hover:bg-[#0141A3]', 'active:scale-95');
        }

        function lanjutkanBooking() {
            if (selectedVehicleData) {
                localStorage.setItem('booking_vehicle', JSON.stringify(selectedVehicleData));

                // Teruskan parameter source=scan jika berasal dari alur scan-ditempat
                const suffix = _sourceScan ? '?source=scan' : '';

                if (selectedVehicleData.jenis === 'mobil') {
                    window.location.href = `pilih-slot-mobil.html${suffix}`;
                } else {
                    window.location.href = `pilih-slot-motor.html${suffix}`;
                }
            }
        }
    </script>
</body>
</html>
