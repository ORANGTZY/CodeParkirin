<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F5F5F5">
    <title>Parkirin - Aktivitas</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #F1F1F1; font-family: 'Montserrat', sans-serif; overscroll-behavior-y: none; margin: 0; }
        .slide-in-right { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .fade-in { animation: fadeIn 0.2s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .nav-curve {
            position: absolute;
            top: -1px; left: 50%; transform: translateX(-50%);
            width: 86px; height: 38px; background-color: #F1F1F1;
            border-bottom-left-radius: 43px; border-bottom-right-radius: 43px;
            border: 1px solid #D9D9D9; border-top: none; z-index: 10;
        }
        .nav-curve::before, .nav-curve::after { content: ""; position: absolute; top: 0; width: 14px; height: 14px; background-color: transparent; }
        .nav-curve::before { left: -14px; border-top-right-radius: 14px; border-right: 1px solid #D9D9D9; border-top: 1px solid #D9D9D9; box-shadow: 4px -4px 0 4px #F1F1F1; }
        .nav-curve::after { right: -14px; border-top-left-radius: 14px; border-left: 1px solid #D9D9D9; border-top: 1px solid #D9D9D9; box-shadow: -4px -4px 0 4px #F1F1F1; }
    </style>
</head>
<body class="flex justify-center h-screen text-gray-800 antialiased bg-gray-200 overflow-hidden">

    <div class="w-full max-w-[402px] bg-[#F1F1F1] h-full relative flex flex-col shadow-2xl overflow-hidden slide-in-right">
        
        <div class="bg-[#F5F5F5] w-full pt-10 pb-2 px-4 z-10 border-b border-gray-200">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center">
                    <a href="user-dashboard.html" class="text-[#0064F0] hover:opacity-80 active:scale-95 transition-all cursor-pointer mr-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="2.5">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                        </svg>
                    </a>
                    <h1 class="text-[20px] font-bold text-[#0064F0]">Aktivitas</h1>
                </div>
            </div>
        </div>

        <div class="w-full flex bg-[#F5F5F5] relative z-10 shadow-sm shrink-0">
            <div id="btn-aktivitas" onclick="switchTab('aktivitas')" class="w-1/2 flex flex-col items-center justify-center pt-3 cursor-pointer">
                <span id="txt-aktivitas" class="text-[12px] font-semibold text-[#0062E6] mb-3">Aktivitas</span>
                <div id="line-aktivitas" class="w-full h-[3px] bg-[#0062E6] transition-colors duration-300"></div> 
            </div>

            <div id="btn-riwayat" onclick="switchTab('riwayat')" class="w-1/2 flex flex-col items-center justify-center pt-3 cursor-pointer">
                <span id="txt-riwayat" class="text-[12px] font-semibold text-gray-400 mb-3">Riwayat</span>
                <div id="line-riwayat" class="w-full h-[3px] bg-transparent transition-colors duration-300"></div> 
            </div>
        </div>

        <div class="flex-grow overflow-y-auto hide-scrollbar p-4 bg-[#F5F5F5] pb-28">
            <div id="view-aktivitas" class="block fade-in space-y-3"></div>
            <div id="view-riwayat" class="hidden fade-in space-y-3"></div>
        </div>

        <div class="absolute bottom-0 w-full max-w-[402px] h-[75px] bg-[#F5F5F5] border-t border-[#D9D9D9] rounded-t-[19px] z-20 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
            <div class="relative w-full h-full px-8 flex items-center justify-center">
                <div class="nav-curve"></div>
                <div class="flex w-full justify-between items-end pb-3 z-30">
                    <a href="user-dashboard.html" class="flex flex-col items-center justify-end w-[60px] hover:opacity-80 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-[28px] w-[28px] text-[#D9D9D9] mb-[5px]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z"/></svg>
                        <span class="text-[#D9D9D9] font-semibold text-[12px] leading-none">Utama</span>
                    </a>
                    <div class="w-[60px]"></div>
                    <a href="profil.html" class="flex flex-col items-center justify-end w-[60px] hover:opacity-80 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-[28px] w-[28px] text-[#D9D9D9] mb-[5px]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        <span class="text-[#D9D9D9] font-semibold text-[12px] leading-none">Pengguna</span>
                    </a>
                </div>
                <a href="tiket.html" class="absolute top-[-26px] left-1/2 -translate-x-1/2 z-40 hover:scale-95 transition-transform">
                    <div class="bg-[#0141A3] w-[61px] h-[61px] rounded-full flex flex-col items-center justify-center shadow-md">
                        <div class="w-[32px] h-[29px] flex flex-col justify-between overflow-hidden rounded-[3px]">
                            <div class="w-full h-[13px] bg-[#F5F5F5]"></div>
                            <div class="w-full h-[13px] bg-[#F5F5F5]"></div>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('user'));

        document.addEventListener("DOMContentLoaded", () => {
            if (userData) {
                fetchAktivitasData();
            }
        });

        async function fetchAktivitasData() {
            const viewAktivitas = document.getElementById('view-aktivitas');
            const viewRiwayat = document.getElementById('view-riwayat');
            
            try {
                // Menarik Data dari Database (Tabel Reservasi)
                const response = await fetch(`http://localhost:3000/api/parkir/reservasi/user/${userData.id}`);
                const result = await response.json();

                if (result.status === 'success' && result.data.length > 0) {
                    let htmlAktivitas = '';
                    let htmlRiwayat = '';
                    let countAktivitas = 0;
                    let countRiwayat = 0;

                    let activeTicketsLocal = JSON.parse(localStorage.getItem('active_tickets')) || [];
                    let updatedActiveTickets = activeTicketsLocal.filter(localTicket => {
                        const dbMatch = result.data.find(dbItem => dbItem.kode_unik === localTicket.id);
                        return dbMatch && (dbMatch.status === 'Aktif' || dbMatch.status === 'Menunggu');
                    });
                    localStorage.setItem('active_tickets', JSON.stringify(updatedActiveTickets));

                    result.data.forEach(item => {
                        // LOGIKA PARSING WAKTU DARI DATABASE
                        const dateObjPesan = new Date(item.waktu_pesan);
                        const dateFormatted = dateObjPesan.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                        const timePesan = dateObjPesan.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + ' WIB';
                        
                        let infoWaktuDetail = '';
                        
                        if (item.status === 'Aktif' || item.status === 'Menunggu') {
                            infoWaktuDetail = `Dipesan: ${timePesan}`;
                        } else if (item.status === 'Selesai') {
                            const timeSelesai = item.waktu_check_out ? new Date(item.waktu_check_out).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + ' WIB' : timePesan;
                            infoWaktuDetail = `Selesai: ${timeSelesai}`;
                        } else {
                            // Untuk Status Dibatalkan (Waktu auto-cancel dari DB / Estimasi Kedatangan)
                            const timeBatal = item.estimasi_kedatangan ? new Date(item.estimasi_kedatangan).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + ' WIB' : timePesan;
                            infoWaktuDetail = `Dibatalkan: ${timeBatal}`;
                        }

                        const slotFormatted = item.blok === 'Mobil' ? `Slot ${item.no_slot}` : `${item.blok}`;

                        const cardHTML = `
                            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex justify-between items-center">
                                <div>
                                    <h4 class="font-bold text-[13px] text-black">${item.nama_area}</h4>
                                    <p class="text-[11px] text-gray-500 mt-0.5">${item.lantai}, ${slotFormatted}</p>
                                    <p class="text-[10px] text-gray-400 mt-2 leading-relaxed font-medium">
                                        ${dateFormatted} • ${infoWaktuDetail} <br> 
                                        Kode: ${item.kode_unik}
                                    </p>
                                </div>
                                <div class="text-right">
                                    <span class="px-2 py-1 rounded-md text-[9px] font-bold uppercase ${
                                        item.status === 'Aktif' ? 'bg-green-100 text-green-600' : 
                                        item.status === 'Selesai' ? 'bg-blue-100 text-blue-600' : 
                                        'bg-red-100 text-red-600'
                                    }">${item.status}</span>
                                </div>
                            </div>
                        `;

                        if (item.status === 'Aktif' || item.status === 'Menunggu') {
                            htmlAktivitas += cardHTML;
                            countAktivitas++;
                        } else {
                            htmlRiwayat += cardHTML;
                            countRiwayat++;
                        }
                    });

                    viewAktivitas.innerHTML = htmlAktivitas || `<p class="text-center text-xs text-gray-400 mt-10">Tidak ada aktivitas parkir berjalan.</p>`;
                    viewRiwayat.innerHTML = htmlRiwayat || `<p class="text-center text-xs text-gray-400 mt-10">Belum ada riwayat transaksi.</p>`;
                    
                    document.getElementById('txt-aktivitas').textContent = `Aktivitas (${countAktivitas})`;
                    document.getElementById('txt-riwayat').textContent = `Riwayat (${countRiwayat})`;
                } else {
                    const emptyState = `<p class="text-center text-xs text-gray-400 mt-10">Belum ada data transaksi.</p>`;
                    viewAktivitas.innerHTML = emptyState;
                    viewRiwayat.innerHTML = emptyState;
                }
            } catch (error) {
                console.error("Gagal menarik data aktivitas:", error);
            }
        }

        function switchTab(tabName) {
            const viewAktivitas = document.getElementById('view-aktivitas');
            const viewRiwayat = document.getElementById('view-riwayat');
            const lineAktivitas = document.getElementById('line-aktivitas');
            const lineRiwayat = document.getElementById('line-riwayat');
            const txtAktivitas = document.getElementById('txt-aktivitas');
            const txtRiwayat = document.getElementById('txt-riwayat');

            if (tabName === 'riwayat') {
                viewAktivitas.classList.replace('block', 'hidden');
                viewRiwayat.classList.replace('hidden', 'block');
                lineAktivitas.classList.replace('bg-[#0062E6]', 'bg-transparent');
                lineRiwayat.classList.replace('bg-transparent', 'bg-[#0062E6]');
                txtAktivitas.classList.replace('text-[#0062E6]', 'text-gray-400');
                txtRiwayat.classList.replace('text-gray-400', 'text-[#0062E6]');
            } else {
                viewRiwayat.classList.replace('block', 'hidden');
                viewAktivitas.classList.replace('hidden', 'block');
                lineRiwayat.classList.replace('bg-[#0062E6]', 'bg-transparent');
                lineAktivitas.classList.replace('bg-transparent', 'bg-[#0062E6]');
                txtRiwayat.classList.replace('text-[#0062E6]', 'text-gray-400');
                txtAktivitas.classList.replace('text-gray-400', 'text-[#0062E6]');
            }
        }
    </script>
</body>
</html>
