<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F5F5F5">

    <title>Parkirin - Pilih Slot Mobil</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F1F1F1; margin: 0; overscroll-behavior-y: none; user-select: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .slot-box { transition: transform 0.1s, background-color 0.2s; }
        .slot-box:active { transform: scale(0.9); }
        .drag-scroll { cursor: grab; }
        .drag-scroll:active { cursor: grabbing; }
    </style>
</head>
<body class="flex justify-center h-screen text-gray-800 antialiased bg-gray-200 overflow-hidden">

    <div class="w-full max-w-[402px] bg-[#F6F6F6] h-full relative flex flex-col shadow-2xl overflow-hidden">
        
        <div class="w-full bg-[#F5F5F5] pt-10 pb-4 px-4 flex flex-col relative z-20 shrink-0 shadow-sm">
            <a href="javascript:history.back()" class="absolute left-4 top-12 text-[#0064F0] hover:opacity-80 transition-all cursor-pointer z-30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
            </a>
            <div class="text-center mt-2">
                <h1 class="text-[14px] font-bold text-black leading-tight">Detail dan Pilih Slot</h1>
                <p class="text-[14px] font-normal text-black leading-tight">Rita Supermall</p>
                <p id="current-date" class="text-[12px] font-semibold text-black mt-4">Memuat...</p>
            </div>
        </div>

        <div class="flex-grow overflow-y-auto hide-scrollbar z-10 flex flex-col pb-40 relative">
            
            <div class="w-full px-4 mt-6">
                <div class="bg-[#F6F6F6] border border-[#D9D9D9] rounded-[6px] w-[155px] p-2 flex flex-col items-center mx-auto shadow-sm">
                    <span id="vehicle-name" class="font-semibold text-[12px] text-black">Memuat...</span>
                    <span id="vehicle-plate" class="font-bold text-[14px] text-black mt-1">...</span>
                </div>
            </div>

            <h2 id="floor-title" class="text-center font-semibold text-[14px] text-black mt-6 mb-4">Lantai B1</h2>

            <div class="flex justify-center items-center gap-6 mb-8">
                <div class="flex items-center gap-2">
                    <div class="w-4 h-4 bg-[#28A745] rounded shadow-sm"></div>
                    <span class="text-[14px] text-[#4B5563]">Tersedia</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-4 h-4 bg-[#DC3545] rounded shadow-sm"></div>
                    <span class="text-[14px] text-[#4B5563]">Terisi</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-4 h-4 bg-[#89E7F9] rounded shadow-sm"></div>
                    <span class="text-[14px] text-[#4B5563]">Dipilih</span>
                </div>
            </div>

            <div id="slot-container" class="px-8 grid grid-cols-5 gap-3 justify-items-center mb-10">
                </div>

        </div>

        <div class="absolute bottom-0 w-full bg-[#F6F6F6] flex flex-col justify-center px-4 z-20 pb-4 pt-2 shadow-[0_-5px_15px_rgba(0,0,0,0.03)] border-t border-[#E5E5E5]">
            <div id="lantai-container" class="drag-scroll w-full overflow-x-auto hide-scrollbar mb-4">
                <div class="flex gap-3 w-max min-w-full justify-start md:justify-center px-2">
                    <div onclick="pilihLantaiMobil(this, 'Lantai B1')" class="floor-btn bg-[#E3E1ED] rounded-[10px] px-6 py-2 cursor-pointer font-semibold text-[14px] shadow-sm shrink-0">Lantai B1</div>
                    <div onclick="pilihLantaiMobil(this, 'Lantai P1')" class="floor-btn bg-[#E3E1ED] rounded-[10px] px-6 py-2 cursor-pointer font-semibold text-[14px] shadow-sm opacity-50 shrink-0">Lantai P1</div>
                    <div onclick="pilihLantaiMobil(this, 'Lantai P2')" class="floor-btn bg-[#E3E1ED] rounded-[10px] px-6 py-2 cursor-pointer font-semibold text-[14px] shadow-sm opacity-50 shrink-0">Lantai P2</div>
                    <div onclick="pilihLantaiMobil(this, 'Lantai P3')" class="floor-btn bg-[#E3E1ED] rounded-[10px] px-6 py-2 cursor-pointer font-semibold text-[14px] shadow-sm opacity-50 shrink-0">Lantai P3</div>
                </div>
            </div>

            <button id="btn-lanjutkan" onclick="lanjutkan()" disabled class="w-full h-[55px] bg-[#D9D9D9] rounded-[10px] flex items-center justify-center transition-all duration-300 shadow-sm shrink-0">
                <span class="text-white font-semibold text-[14px]">Lanjut Pemesanan</span>
            </button>
        </div>

        <div id="alertModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black bg-opacity-40 backdrop-blur-sm transition-opacity opacity-0">
            <div id="alertModalContent" class="bg-white w-[280px] rounded-[20px] p-6 flex flex-col items-center shadow-2xl transform scale-90 transition-transform duration-300">
                <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <h3 class="text-[18px] font-bold text-black mb-2 text-center">Penuh</h3>
                <p class="text-[12px] font-medium text-gray-500 text-center mb-6 leading-relaxed">Maaf, slot parkir ini sudah terisi. Silakan pilih slot yang berwarna hijau!</p>
                <button onclick="closeAlertModal()" class="w-full bg-[#0141A3] hover:bg-blue-800 text-white font-bold py-2.5 rounded-[12px] text-[12px] transition-colors shadow-md active:scale-95">Mengerti</button>
            </div>
        </div>

    </div>

    <script>
        let selectedSlot = null;
        let selectedFloor = 'Lantai B1';

        // Deteksi apakah dibuka dari alur scan-ditempat
        const _urlParams  = new URLSearchParams(window.location.search);
        const _sourceScan = _urlParams.get('source') === 'scan' || sessionStorage.getItem('scan_source') === 'scan';

        document.addEventListener("DOMContentLoaded", () => {
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            const d = new Date();
            document.getElementById('current-date').textContent = `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;

            const vehicle = JSON.parse(localStorage.getItem('booking_vehicle'));
            if(vehicle) {
                document.getElementById('vehicle-name').textContent = vehicle.name;
                document.getElementById('vehicle-plate').textContent = vehicle.plate;
            }

            renderSlots();

            const slider = document.getElementById('lantai-container');
            let isDown = false; let startX; let scrollLeft;
            slider.addEventListener('mousedown', (e) => { isDown = true; slider.classList.add('active'); startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
            slider.addEventListener('mouseleave', () => { isDown = false; slider.classList.remove('active'); });
            slider.addEventListener('mouseup', () => { isDown = false; slider.classList.remove('active'); });
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                slider.scrollLeft = scrollLeft - (x - startX) * 2; 
            });
        });

        function pilihLantaiMobil(element, namaLantai) {
            const floorBtns = document.querySelectorAll('.floor-btn');
            floorBtns.forEach(btn => btn.classList.add('opacity-50'));
            element.classList.remove('opacity-50');

            selectedFloor = namaLantai;
            document.getElementById('floor-title').textContent = namaLantai;
            
            selectedSlot = null;
            const btn = document.getElementById('btn-lanjutkan');
            btn.disabled = true;
            btn.classList.add('bg-[#D9D9D9]');
            btn.classList.remove('bg-[#0141A3]', 'hover:bg-blue-800', 'active:scale-95');

            renderSlots();
        }

        function tampilkanPesanPenuh() {
            const modal = document.getElementById('alertModal');
            const modalContent = document.getElementById('alertModalContent');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                modalContent.classList.remove('scale-90');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeAlertModal() {
            const modal = document.getElementById('alertModal');
            const modalContent = document.getElementById('alertModalContent');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        async function renderSlots() {
            const container = document.getElementById('slot-container');
            container.innerHTML = '<div class="col-span-5 text-center text-xs text-gray-400">Sinkronisasi Database...</div>';
            
            try {
                // Mengirim nama lantai dinamis ke API
                const response = await fetch(`http://localhost:3000/api/parkir/slots/mobil/1/${encodeURIComponent(selectedFloor)}`);
                const result = await response.json();
                container.innerHTML = '';
                
                if (result.status === 'success' && result.data.length > 0) {
                    result.data.forEach(slot => {
                        if (slot.status !== 'Tersedia') {
                            container.innerHTML += `
                            <div onclick="tampilkanPesanPenuh()" class="slot-box cursor-not-allowed w-[42px] h-[63px] bg-[#DC3545] rounded-[8px] flex items-center justify-center shadow-sm opacity-90">
                                <span class="text-white font-bold text-[14px] pointer-events-none">${slot.no_slot}</span>
                            </div>`;
                        } else {
                            container.innerHTML += `
                            <div onclick="pilihSlotMobil(this, '${slot.no_slot}')" class="slot-box cursor-pointer w-[42px] h-[63px] bg-[#28A745] rounded-[8px] flex items-center justify-center shadow-sm">
                                <span class="text-white font-bold text-[14px] pointer-events-none">${slot.no_slot}</span>
                            </div>`;
                        }
                    });
                } else {
                    container.innerHTML = '<div class="col-span-5 text-center text-xs text-gray-400">Tidak ada slot untuk lantai ini.</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="col-span-5 text-center text-xs text-red-500">Gagal terhubung ke Database Server.</div>';
            }
        }

        function pilihSlotMobil(element, slotName) {
            if(element.classList.contains('bg-[#DC3545]')) return;

            const allSlots = document.querySelectorAll('.slot-box');
            allSlots.forEach(slot => {
                if(slot.classList.contains('bg-[#89E7F9]')) {
                    slot.classList.remove('bg-[#89E7F9]');
                    slot.classList.add('bg-[#28A745]'); 
                    slot.querySelector('span').classList.replace('text-black', 'text-white');
                }
            });

            element.classList.remove('bg-[#28A745]');
            element.classList.add('bg-[#89E7F9]');
            element.querySelector('span').classList.replace('text-white', 'text-black');
            
            selectedSlot = slotName;

            const btn = document.getElementById('btn-lanjutkan');
            btn.disabled = false;
            btn.classList.remove('bg-[#D9D9D9]');
            btn.classList.add('bg-[#0141A3]', 'hover:bg-blue-800', 'active:scale-95');
        }

        function lanjutkan() {
            if(selectedSlot) {
                localStorage.setItem('booking_lantai', selectedFloor);
                localStorage.setItem('booking_slot', selectedSlot);

                // Jika dari alur scan-ditempat → konfirmasi PIN dulu
                if (_sourceScan) {
                    window.location.href = 'konfirmasi-pin.html?source=scan';
                } else {
                    window.location.href = 'ringkasan-pesanan.html';
                }
            }
        }
    </script>
</body>
</html>
