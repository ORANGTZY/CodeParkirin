<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1A73E8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <title>Parkirin - Lupa Password</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #1A73E8; 
            background-image: radial-gradient(circle at 10% 20%, rgba(172, 198, 255, 0.2) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(126, 171, 255, 0.2) 0%, transparent 40%);
            font-family: 'Montserrat', sans-serif;
            overscroll-behavior-y: none;
        }
        
        /* Animasi masuk dari bawah */
        .slide-up {
            animation: slideUp 0.6s ease-out forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex justify-center min-h-screen text-gray-800 antialiased">

    <div class="w-full max-w-[402px] flex flex-col min-h-screen relative px-4 py-8">
        
        <div class="flex justify-center items-center mb-6 mt-4 slide-up">
            <img src="./assets/img/LOGO.png" alt="Logo Parkirin" class="h-9 object-contain drop-shadow-md">
        </div>

        <div class="bg-[#EAF8FC] rounded-[15px] p-6 shadow-xl flex-grow flex flex-col items-center text-center relative slide-up" style="animation-delay: 0.1s;">
            
            <a href="login.html" class="absolute top-6 left-5 text-gray-500 hover:text-black transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </a>

            <h1 class="text-[20px] font-bold text-black mt-2 mb-8">
                Lupa Password
            </h1>

            <div class="w-32 h-32 bg-[#D8F6FF] rounded-full flex items-center justify-center mb-10 shadow-inner border border-blue-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-[#0141A3]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>

            <p class="text-[14px] font-medium text-black leading-relaxed text-left w-full mb-4">
                Masukkan email terdaftar Anda untuk menerima tautan reset.
            </p>

            <form id="forgotPasswordForm" class="w-full flex flex-col flex-grow">
                
                <div class="relative w-full mb-auto">
                    <input type="email" id="email_reset" placeholder="Masukkan Email Anda" required
                        class="w-full bg-white rounded-[10px] border border-black h-[55px] px-4 text-[14px] font-medium text-black placeholder-black/30 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>

                <div class="w-full mt-10">
                    <button type="submit" 
                        class="w-full bg-[#0141A3] hover:bg-blue-900 text-white font-semibold text-[13px] h-[48px] rounded-[10px] shadow-md transition-all active:scale-95 mb-4">
                        Kirim Tautan
                    </button>

                    <div class="text-[11px] text-gray-700">
                        Butuh bantuan? <a href="#" class="text-[#0064F0] hover:underline font-medium">Hubungi Kami</a>
                    </div>
                </div>
            </form>

        </div>
    </div>

    <!-- Modal Kustom -->
    <div id="customModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black bg-opacity-40 backdrop-blur-sm transition-opacity opacity-0">
        <div id="customModalContent" class="bg-white w-[300px] rounded-[20px] p-6 flex flex-col items-center shadow-2xl transform scale-90 transition-transform duration-300 mx-4">
            <div class="w-16 h-16 bg-[#D8F6FF] rounded-full flex items-center justify-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9 text-[#0141A3]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
            <h3 class="text-[18px] font-bold text-black mb-2 text-center">Email Terkirim!</h3>
            <p id="modalMessage" class="text-[12px] font-medium text-gray-500 text-center mb-6 leading-relaxed"></p>
            <button onclick="tutupModalDanKembali()" class="w-full bg-[#0141A3] hover:bg-blue-900 text-white font-bold py-3 rounded-[12px] text-[13px] transition-colors shadow-md active:scale-95">
                Kembali ke Halaman Login
            </button>
        </div>
    </div>

    <script>
        function tampilkanModal(email) {
            document.getElementById('modalMessage').textContent = `Tautan untuk mereset password telah dikirim ke:\n${email}\n\nSilakan periksa kotak masuk Anda.`;
            document.getElementById('modalMessage').innerHTML = `Tautan reset password telah dikirim ke<br><span class="font-bold text-black">${email}</span><br><br>Silakan periksa kotak masuk Anda.`;

            const modal = document.getElementById('customModal');
            const modalContent = document.getElementById('customModalContent');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                modalContent.classList.remove('scale-90');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function tutupModalDanKembali() {
            window.location.href = 'login.html';
        }

        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email_reset').value;
            tampilkanModal(email);
        });
    </script>
</body>
</html>
