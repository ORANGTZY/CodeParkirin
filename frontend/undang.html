<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F5F5F5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Parkirin - Undang dan Dapatkan</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #F1F1F1;
            font-family: 'Montserrat', sans-serif;
            overscroll-behavior-y: none;
            margin: 0;
        }

        /* Animasi masuk halaman */
        .slide-in-right {
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Animasi pergantian tab */
        .fade-in {
            animation: fadeIn 0.2s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex justify-center h-screen text-gray-800 antialiased bg-gray-200">

    <div class="w-full max-w-[402px] bg-[#F5F5F5] h-full relative flex flex-col shadow-2xl overflow-hidden slide-in-right">
        
        <div class="bg-[#F5F5F5] w-full pt-10 pb-4 px-4 z-10 border-b border-gray-200">
            <div class="flex items-center">
                <a href="user-dashboard.html" class="text-[#0064F0] hover:opacity-80 active:scale-95 transition-all cursor-pointer mr-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="2.5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                    </svg>
                </a>
                <h1 class="text-[20px] font-bold text-[#0064F0]">Undang dan Dapatkan</h1>
            </div>
        </div>

        <div class="w-full flex bg-[#F5F5F5] relative z-10 shadow-[0_2px_4px_-1px_rgba(0,0,0,0.05)]">
            <div id="btn-aktivitas" onclick="switchTab('aktivitas')" class="w-1/2 flex flex-col items-center justify-center pt-3 cursor-pointer hover:bg-gray-100 transition-colors">
                <span class="text-[12px] font-semibold text-black mb-3">Aktivitas</span>
                <div id="line-aktivitas" class="w-full h-[3px] bg-[#0062E6] transition-colors duration-300"></div> 
            </div>

            <div id="btn-riwayat" onclick="switchTab('riwayat')" class="w-1/2 flex flex-col items-center justify-center pt-3 cursor-pointer hover:bg-gray-100 transition-colors">
                <span class="text-[12px] font-semibold text-black mb-3">Riwayat</span>
                <div id="line-riwayat" class="w-full h-[3px] bg-[#D9D9D9] transition-colors duration-300"></div> 
            </div>
        </div>

        <div class="flex-grow bg-[#F5F5F5] overflow-y-auto hide-scrollbar relative">
            
            <div id="view-aktivitas" class="block fade-in flex flex-col items-center h-full px-4 pt-10 pb-8">
                
                <h2 class="text-[32px] font-extrabold text-black text-center leading-[1.2] tracking-tight mb-6 mt-4">
                    UNDANG<br>TEMAN DAN<br>DAPATKAN<br>HADIAHNYA!
                </h2>

                <p class="text-[11px] font-medium text-black text-center mb-4">
                    Ajak temanmu dan kalian akan mendapatkan poin!
                </p>

                <a href="undang-detail.html" class="text-[11px] font-bold text-[#0062E6] hover:underline mb-12">
                    PELAJARI LEBIH LANJUT
                </a>

                <div class="flex justify-center gap-6 mb-10 w-full px-2">
                    <div class="flex flex-col items-center cursor-pointer hover:opacity-80 transition-opacity active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-11 h-11 mb-2" viewBox="0 0 24 24" fill="#1877F2">
                            <path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.15 10.13 24v-8.44H7.08v-3.49h3.04V9.41c0-3.02 1.8-4.7 4.4-4.7 1.33 0 2.72.24 2.72.24v3h-1.53c-1.51 0-1.98.94-1.98 1.9v2.28h3.36l-.54 3.49h-2.82V24C19.62 23.15 24 18.1 24 12.07z"/>
                        </svg>
                        <span class="text-[10px] font-medium text-black">Facebook</span>
                    </div>

                    <div class="flex flex-col items-center cursor-pointer hover:opacity-80 transition-opacity active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-11 h-11 mb-2" viewBox="0 0 24 24" fill="#25D366">
                            <path d="M12.01 0C5.39 0 0 5.37 0 11.98c0 2.12.55 4.19 1.6 6.01L.06 24l6.17-1.6c1.78 1.01 3.77 1.54 5.78 1.54 6.62 0 12.01-5.38 12.01-11.98S18.64 0 12.01 0zm0 21.94c-1.8 0-3.56-.48-5.11-1.39l-.36-.21-3.8 1 .01-3.7-.24-.37A9.97 9.97 0 012.01 12C2.01 6.48 6.5 2 12.01 2c5.51 0 10 4.48 10 10s-4.49 10-10 10zm5.49-7.5c-.3-.15-1.78-.88-2.05-.98-.28-.1-.48-.15-.68.15-.2.3-.78.98-.95 1.18-.17.2-.35.23-.65.08-.3-.15-1.27-.47-2.42-1.32-.9-.67-1.5-1.5-1.68-1.8-.18-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.38-.03-.53-.08-.15-.68-1.63-.93-2.23-.24-.58-.48-.5-.68-.51h-.58c-.2 0-.53.08-.8.38-.28.3-1.05 1.03-1.05 2.5s1.08 2.9 1.23 3.1c.15.2 2.11 3.23 5.11 4.52 2.01.86 2.76.92 3.76.78 1.08-.15 3.19-1.3 3.64-2.55.45-1.25.45-2.33.32-2.55-.13-.23-.48-.35-.78-.5z"/>
                        </svg>
                        <span class="text-[10px] font-medium text-black">WhatsApp</span>
                    </div>

                    <div class="flex flex-col items-center cursor-pointer hover:opacity-80 transition-opacity active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-11 h-11 mb-2" viewBox="0 0 48 48">
                            <path fill="#4caf50" d="M45,16.2l-5,2.75l-5,4.75V40h7.5C43.88,40,45,38.88,45,37.5V16.2z"/>
                            <path fill="#1e88e5" d="M3,16.2l3.61,2.06l6.39,5.44V40H5.5C4.12,40,3,38.88,3,37.5V16.2z"/>
                            <path fill="#e53935" d="M35,11.2l-11,8.25L13,11.2C13.43,9.93,14.65,9,16,9h16C33.35,9,34.57,9.93,35,11.2z"/>
                            <path fill="#ffb300" d="M45,16.2v-2.7C45,11.57,43.43,10,41.5,10h-6.5l-11,8.25L35,23.7L45,16.2z"/>
                            <path fill="#fbc02d" d="M3,16.2v-2.7C3,11.57,4.57,10,6.5,10h6.5l11,8.25L13,23.7L3,16.2z"/>
                        </svg>
                        <span class="text-[10px] font-medium text-black">Email</span>
                    </div>

                    <div class="flex flex-col items-center cursor-pointer hover:opacity-80 transition-opacity active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-11 h-11 mb-2" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92zM18 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM6 13c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm12 7.02c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/>
                        </svg>
                        <span class="text-[10px] font-medium text-black">Share</span>
                    </div>
                </div>

                <div class="flex items-center w-full px-4 gap-3 mt-auto mb-4">
                    <div class="flex-grow h-[44px] bg-[#F5F5F5] border-2 border-[#D9D9D9] rounded-[10px] flex items-center px-4">
                        <span id="referralCode" class="font-medium text-[16px] text-black">9024191</span>
                    </div>
                    
                    <button onclick="copyCode()" class="h-[44px] px-6 bg-[#0062E6] hover:bg-blue-700 rounded-[30px] flex items-center justify-center shadow-md transition-all active:scale-95">
                        <span class="font-medium text-[14px] text-white whitespace-nowrap">SALIN CODE</span>
                    </button>
                </div>

            </div>

            <div id="view-riwayat" class="hidden fade-in flex-col h-full">
                
                <div class="flex-grow flex items-center justify-center">
                    <p class="text-[14px] font-medium text-gray-400">Belum ada riwayat</p>
                </div>
                
                <div class="px-6 pb-10 mt-auto">
                    <button class="w-full bg-[#0141A3] hover:bg-blue-900 text-white rounded-[10px] h-[47px] shadow-md transition-all active:scale-95 flex items-center justify-center">
                        <span class="font-semibold text-[11px] tracking-wide">UNDANG LEBIH BANYAK TEMAN</span>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        function switchTab(tabName) {
            const lineAktivitas = document.getElementById('line-aktivitas');
            const lineRiwayat = document.getElementById('line-riwayat');
            const contentAktivitas = document.getElementById('view-aktivitas');
            const contentRiwayat = document.getElementById('view-riwayat');

            if (tabName === 'riwayat') {
                lineAktivitas.classList.replace('bg-[#0062E6]', 'bg-[#D9D9D9]');
                lineRiwayat.classList.replace('bg-[#D9D9D9]', 'bg-[#0062E6]');
                
                contentAktivitas.classList.replace('flex', 'hidden');
                contentRiwayat.classList.replace('hidden', 'flex');
            } else {
                lineRiwayat.classList.replace('bg-[#0062E6]', 'bg-[#D9D9D9]');
                lineAktivitas.classList.replace('bg-[#D9D9D9]', 'bg-[#0062E6]');
                
                contentRiwayat.classList.replace('flex', 'hidden');
                contentAktivitas.classList.replace('hidden', 'flex');
            }
        }

        function copyCode() {
            const codeText = document.getElementById('referralCode').innerText;
            
            navigator.clipboard.writeText(codeText).then(() => {
                alert("Kode Referral '" + codeText + "' berhasil disalin!");
            }).catch(err => {
                console.error('Gagal menyalin kode: ', err);
            });
        }
    </script>
</body>
</html>
