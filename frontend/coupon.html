<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F5F5F5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Parkirin - Kupon Saya</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png"> 

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #F1F1F1;
            font-family: 'Montserrat', sans-serif;
            overscroll-behavior-y: none; /* Mencegah efek karet saat scroll di HP */
            margin: 0;
        }

        /* Animasi masuk halaman */
        .slide-in-right {
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Animasi pergantian tab */
        .fade-in {
            animation: fadeIn 0.2s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide scrollbar */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex justify-center min-h-screen text-gray-800 antialiased">

    <div class="w-full max-w-[402px] bg-[#F1F1F1] min-h-screen relative flex flex-col shadow-2xl overflow-hidden slide-in-right">
        
        <div class="bg-[#F5F5F5] w-full pt-10 pb-4 px-4 z-10">
            <div class="flex items-center mb-6">
                <a href="user-dashboard.html" class="text-[#0064F0] hover:opacity-80 active:scale-95 transition-all cursor-pointer mr-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="2.5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                    </svg>
                </a>
                <h1 class="text-[20px] font-bold text-[#0064F0]">Kupon Saya</h1>
            </div>

            <div class="border-2 border-[#0064F0] bg-[#F5F5F5] rounded-[10px] px-4 py-3 flex justify-between items-center shadow-sm">
                <div class="flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#89E7F9]" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                    </svg>
                    <span class="font-semibold text-[15px] text-[#0F252A]">Points</span>
                </div>
                <div class="flex items-center gap-2 cursor-pointer active:opacity-70">
                    <span class="font-semibold text-[15px] text-[#0F252A]">0</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#0064F0]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                    </svg>
                </div>
            </div>

            <div class="flex gap-3 mt-5">
                <button id="btn-kupon" onclick="switchTab('kupon')" class="px-4 py-1.5 rounded-[10px] text-[10px] font-semibold bg-[#0064F0] text-white border border-[#0064F0] transition-colors focus:outline-none">
                    Kupon Saya
                </button>
                <button id="btn-hadiah" onclick="switchTab('hadiah')" class="px-4 py-1.5 rounded-[10px] text-[10px] font-semibold bg-white text-black border border-black transition-colors focus:outline-none">
                    Hadiah
                </button>
                <button id="btn-misi" onclick="switchTab('misi')" class="px-4 py-1.5 rounded-[10px] text-[10px] font-semibold bg-white text-black border border-black transition-colors focus:outline-none">
                    Misi
                </button>
            </div>
        </div>

        <div class="flex-grow bg-[#F1F1F1] mt-2 relative z-0 overflow-y-auto hide-scrollbar">
            
            <div id="view-kupon" class="block fade-in">
                <div onclick="toggleAccordion('content-kupon', 'arrow-kupon')" class="bg-[#F5F5F5] rounded-[10px] py-4 px-6 flex justify-between items-center mx-1 shadow-sm cursor-pointer hover:bg-gray-100 active:bg-gray-200 transition-colors select-none">
                    <span class="font-semibold text-[15px] text-[#0F252A]">Parkir</span>
                    <svg id="arrow-kupon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#0064F0] transform transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>
                
                <div id="content-kupon" class="block mt-2 bg-[#F5F5F5] rounded-[10px] min-h-[300px] w-full p-4 mx-1">
                    <p class="text-gray-400 text-center text-xs mt-10">Belum ada kupon yang tersedia.</p>
                </div>
            </div>

            <div id="view-hadiah" class="hidden fade-in">
                <div onclick="toggleAccordion('content-hadiah', 'arrow-hadiah')" class="bg-[#F5F5F5] rounded-[10px] py-4 px-6 flex justify-between items-center mx-1 shadow-sm cursor-pointer hover:bg-gray-100 active:bg-gray-200 transition-colors select-none">
                    <span class="font-semibold text-[15px] text-[#0F252A]">Semua</span>
                    <svg id="arrow-hadiah" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#0064F0] transform transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>
                
                <div id="content-hadiah" class="block mt-2 bg-[#F5F5F5] rounded-t-[10px] min-h-[500px] w-full pt-4 px-4 pb-20 mx-1">
                    <div class="bg-[#F5F5F5] border border-gray-200 rounded-[15px] overflow-hidden shadow-md">
                        <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=600&auto=format&fit=crop" alt="Promo Banner" class="w-full h-[130px] object-cover">
                        <div class="px-4 py-3 bg-[#F5F5F5]">
                            <h3 class="font-bold text-[15px] text-black">Referal</h3>
                            <p class="text-[10px] font-semibold text-black/80 mt-0.5">Active until 31 Dec 2031</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-misi" class="hidden fade-in">
                <div onclick="toggleAccordion('content-misi', 'arrow-misi')" class="bg-[#F5F5F5] rounded-[10px] py-4 px-6 flex justify-between items-center mx-1 shadow-sm cursor-pointer hover:bg-gray-100 active:bg-gray-200 transition-colors select-none">
                    <span class="font-semibold text-[15px] text-[#0F252A]">Parkir</span>
                    <svg id="arrow-misi" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#0064F0] transform transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>
                
                <div id="content-misi" class="block mt-2 bg-[#F5F5F5] rounded-[10px] min-h-[300px] w-full p-4 mx-1">
                    <p class="text-gray-400 text-center text-xs mt-10">Belum ada misi yang berjalan.</p>
                </div>
            </div>

        </div>

    </div>

    <script>
        // Logika Pindah Tab (Kupon, Hadiah, Misi)
        function switchTab(tabId) {
            const tabs = ['kupon', 'hadiah', 'misi'];

            tabs.forEach(id => {
                const btn = document.getElementById(`btn-${id}`);
                const view = document.getElementById(`view-${id}`);

                if (id === tabId) {
                    btn.className = "px-4 py-1.5 rounded-[10px] text-[10px] font-semibold bg-[#0064F0] text-white border border-[#0064F0] transition-colors focus:outline-none";
                    view.classList.remove('hidden');
                    view.classList.add('block');
                } else {
                    btn.className = "px-4 py-1.5 rounded-[10px] text-[10px] font-semibold bg-white text-black border border-black transition-colors focus:outline-none";
                    view.classList.remove('block');
                    view.classList.add('hidden');
                }
            });
        }

        // Logika Buka Tutup Accordion (Kotak Area)
        function toggleAccordion(contentId, arrowId) {
            const content = document.getElementById(contentId);
            const arrow = document.getElementById(arrowId);

            if (content.classList.contains('hidden')) {
                // Sedang tertutup, kita BUKA
                content.classList.remove('hidden');
                content.classList.add('block');
                
                // Panah menghadap Bawah (V)
                arrow.classList.remove('-rotate-90');
            } else {
                // Sedang terbuka, kita TUTUP
                content.classList.remove('block');
                content.classList.add('hidden');
                
                // Panah diputar 90 derajat berlawanan jarum jam (Menghadap Kanan/Samping >)
                arrow.classList.add('-rotate-90');
            }
        }
    </script>
</body>
</html>
